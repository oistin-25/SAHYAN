<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | SAHYAN</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo">SAHYAN</a>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="story.html">Story</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="process.html">Process</a></li>
        <li><a href="why-sahyan.html">Why Sahyan</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
    <div class="actions">
      <button class="theme-toggle" aria-label="Toggle Dark Mode">
        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1.2em" width="1.2em"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
      </button>
    </div>
  </header>

  <main style="padding-top: 120px;">
    <section class="section container fade-in" style="max-width: 800px;">
      <h1 class="text-serif text-accent text-center" style="font-size: 4rem; margin-bottom: 1rem;">Contact Us</h1>
      <p class="text-center" style="opacity: 0.8; margin-bottom: 4rem; letter-spacing: 1px;">We deliver all over India, directly from our legacy farms in Wayanad.</p>
      
      <form style="background: var(--card-bg); padding: 4rem; border: 1px solid var(--border-color); border-radius: 4px;">
        <div class="form-group">
          <input type="text" class="form-control" placeholder="Your Name" required>
        </div>
        <div class="form-group">
          <input type="email" class="form-control" placeholder="Your Email" required>
        </div>
        <div class="form-group">
          <textarea class="form-control" placeholder="Your Message" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Send Message</button>
      </form>
      
      <div class="text-center" style="margin-top: 4rem; padding-top: 4rem; border-top: 1px solid var(--border-color);">
         <a href="#" class="btn btn-outline" style="border-color: #25D366; color: #25D366;">Contact via WhatsApp</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="logo" style="font-size: 1.2rem;">SAHYAN</div>
    <ul class="footer-links">
      <li><a href="story.html">Story</a></li>
      <li><a href="products.html">Products</a></li>
    </ul>
    <div style="opacity: 0.6; font-size: 0.9rem;">&copy; 2026 SAHYAN. All rights reserved.</div>
  </footer>

  <script src="./main.js"></script>
</body>
</html>
